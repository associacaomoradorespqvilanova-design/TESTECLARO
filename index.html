<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM - Claro Terceirizada</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== TELA DE LOGIN ========== -->
  <div id="loginScreen" class="screen login-screen">
    <div class="login-wrapper">
      <!-- Logo: substitua o src pelo link do Imgur -->
      <img src="https://i.imgur.com/SEU_LINK_AQUI.png" alt="Logo" class="logo">
      <div class="login-card">
        <h2>Acessar o CRM</h2>
        <form id="loginForm">
          <div class="campo">
            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" placeholder="Digite seu usuário" required>
          </div>
          <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required>
          </div>
          <button type="submit">Entrar</button>
        </form>
        <p id="loginMsg"></p>
      </div>
    </div>
  </div>

  <!-- ========== PAINEL DO CRM ========== -->
  <div id="appScreen" class="screen" style="display: none;">
    <header>
      <h1>CRM Empresa</h1>
      <button id="logoutBtn">Sair</button>
    </header>

    <div class="container">
      <nav class="sidebar">
        <ul>
          <li><a href="#" data-section="clientes" class="ativo">Clientes</a></li>
          <li><a href="#" data-section="negocios">Negócios</a></li>
          <li><a href="#" data-section="atividades">Atividades</a></li>
        </ul>
      </nav>

      <main class="content">
        <!-- Seção de Clientes -->
        <section id="secao-clientes" class="secao ativa">
          <h2>Clientes</h2>
          <div class="lista" id="listaClientes">
            <p>Nenhum cliente cadastrado.</p>
          </div>
          <button class="btn-novo">+ Novo Cliente</button>
        </section>

        <!-- Seção de Negócios -->
        <section id="secao-negocios" class="secao">
          <h2>Negócios</h2>
          <div class="lista" id="listaNegocios">
            <p>Nenhum negócio cadastrado.</p>
          </div>
          <button class="btn-novo">+ Novo Negócio</button>
        </section>

        <!-- Seção de Atividades -->
        <section id="secao-atividades" class="secao">
          <h2>Atividades</h2>
          <div class="lista" id="listaAtividades">
            <p>Nenhuma atividade registrada.</p>
          </div>
          <button class="btn-novo">+ Nova Atividade</button>
        </section>
      </main>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
